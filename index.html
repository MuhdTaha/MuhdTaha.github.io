<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction | Your E-Commerce</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #222021;
            color: #fff;
            text-align: center;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .logo {
            width: 200px;
            height: auto;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            margin-bottom: 40px;
        }

        .progress-bar-container {
            width: 70%;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 5px;
        }

        .progress-bar {
            width: 10%; /* Adjust the width based on your progress */
            background: #4CAF50;
            border-radius: 10px;
            padding: 5px;
        }

        .progress-text {
            margin-top: 10px;
            font-size: 16px;
        }
    </style>
</head>

<body>
    <div class="overlay"></div>
    <div class="container">
        <img src="images/logo3.png" alt="365 Prime Ventures" class="logo">
        <h1>Website Under Construction</h1>
        <p>We're working hard to bring you an amazing online shopping experience!</p>
        <div class="progress-bar-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <p class="progress-text">Launching Soon!</p>
    </div>
</body>

</html>
